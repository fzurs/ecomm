          $ref: '#/components/schemas/OrderStatusEnum'
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        customer:
          type: integer
          nullable: true
        products:
          type: array
          items:
            type: string
            format: uuid
          readOnly: true
      required:
      - created_at
      - id
      - products
      - updated_at
    OrderStatusEnum:
      enum:

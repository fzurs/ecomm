  /products/:
    get:
      operationId: products_list
      parameters:
      - in: query
        name: brand
        schema:
          type: integer
      - in: query
        name: category
        schema:
          type: integer
      - name: limit
        required: false
        in: query
        description: Number of results to return per page.
        schema:
          type: integer
      - name: offset
        required: false
        in: query
        description: The initial index from which to return the results.
        schema:
          type: integer
      - name: ordering
        required: false
        in: query
        description: Which field to use when ordering the results.
        schema:
          type: string
      - name: search
        required: false
        in: query
        description: A search term.
        schema:
          type: string
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - discontinued
          - draft
          - inactive
          - out_of_stock
        description: |-
          * `draft` - Draft
          * `active` - Active
          * `inactive` - Inactive
          * `out_of_stock` - Out of stock
          * `discontinued` - Discontinued

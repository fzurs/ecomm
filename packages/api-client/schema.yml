      - paid
      - shipped
      - completed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `paid` - Paid
        * `shipped` - Shipped
        * `completed` - Completed
        * `cancelled` - Cancelled
    PaginatedBrandList:
      type: object
      required:

services:
  db:
    image: postgres:17-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: admin 
      POSTGRES_PASSWORD: admin 
      POSTGRES_DB: ecommerce_example_db 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  ecommerceexample:
    depends_on:
     - db
    environment:
      - DATABASE_NAME=postgres
      - DATABASE_USER=admin
      - DATABASE_PASSWORD=admin
      - DATABASE_HOST=db
    image: ecommerceexample
    build:
      context: .
      dockerfile: ./Dockerfile
    ports:
      - 8080:8080

volumes:
  postgres_data: